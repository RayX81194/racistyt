<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RacistYT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0f0f11;
    font-family: "Inter", sans-serif;
    color: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 320px;
    height: 280px;
}

.container {
    width: 100%;
    padding: 18px;
    background: #18181b;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 18px;
}

.header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.5px;
}

/* Controls */
.control-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.control-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

label {
    font-size: 13px;
    color: #a1a1aa;
}

/* Select */
select {
    background: #232326;
    border: none;
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
}

/* Toggle Switch */
.switch {
    position: relative;
    width: 38px;
    height: 20px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #3f3f46;
    border-radius: 20px;
    transition: 0.3s;
}

.slider::before {
    content: "";
    position: absolute;
    height: 14px;
    width: 14px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider {
    background: #22c55e;
}

input:checked + .slider::before {
    transform: translateX(18px);
}

/* Note */
.note {
    margin-top: 14px;
    font-size: 11px;
    color: #71717a;
    text-align: center;
}

/* Footer */
.footer {
    margin-top: 10px;
    text-align: center;
    font-size: 11px;
    color: #52525b;
}

.footer a {
    color: #a1a1aa;
    text-decoration: none;
}

.footer a:hover {
    color: #ffffff;
}
</style>
</head>

<body>
<div class="container">

    <div class="header">
        <h1>RacistYT</h1>
    </div>

    <div class="control-group">

        <div class="control-item">
            <label>Font</label>
            <select id="font-select">
                <option>Inter</option>
                <option>Roboto</option>
                <option>Lato</option>
                <option>Montserrat</option>
            </select>
        </div>

        <div class="control-item">
            <label>Hide Shorts</label>
            <label class="switch">
                <input type="checkbox" id="toggleSwitch">
                <span class="slider"></span>
            </label>
        </div>

    </div>

    <div class="note">
        Reload YouTube after changes
    </div>

    <div class="footer">
        by <a href="https://rayx81194.github.io/" target="_blank">Ray</a>
    </div>

</div>

<script src="popup.js"></script>
</body>
</html>
